<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <meta
      name="description"
      content="Portfolio website for {{ site.name }}, {{ site.tagline }}."
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="{{ url_for('home') }}">
          <span class="brand-mark">WR</span>
          <span>
            <strong>{{ site.name }}</strong>
            <small>{{ site.tagline }}</small>
          </span>
        </a>
        <nav class="nav">
          <a class="{% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a>
          <a class="{% if active_page == 'bio' %}active{% endif %}" href="{{ url_for('bio') }}">Bio</a>
          <a class="{% if active_page == 'portfolio' %}active{% endif %}" href="{{ url_for('portfolio') }}">Portfolio</a>
          <a class="{% if active_page == 'pitch' %}active{% endif %}" href="{{ url_for('elevator_pitch') }}">Elevator Pitch</a>
        </nav>
      </header>

      <main class="content-wrap">
        {% block content %}{% endblock %}
      </main>

      <footer class="footer">
        <p>Rabat, Morocco</p>
        <p>
          <a href="{{ site.linkedin }}" target="_blank" rel="noreferrer">LinkedIn</a>
          <span>·</span>
          <a href="{{ site.github }}" target="_blank" rel="noreferrer">GitHub</a>
          <span>·</span>
          <a href="{{ site.email }}">Email</a>
        </p>
      </footer>
    </div>
  </body>
</html>
